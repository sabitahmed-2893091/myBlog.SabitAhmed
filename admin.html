<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>myBlog - Admin Dashboard</title>
    <style>
        body {
            background-color: #FFFFFF;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        a {
            color: #0033CC;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        #header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            margin-bottom: 15px;
        }
        #logo {
            font-size: 28px;
            font-weight: bold;
            color: #000;
            letter-spacing: -1px;
        }
        #logo span {
            background-color: #FF0000;
            color: #FFF;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 2px;
        }
        .button-retro {
            background: #ECECEC;
            border: 1px solid #CCCCCC;
            border-bottom: 2px solid #999999;
            border-right: 2px solid #999999;
            color: #000;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 4px;
        }
        .button-retro:active {
            border: 1px solid #999999;
            border-top: 2px solid #666666;
            border-left: 2px solid #666666;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .box {
            border: 1px solid #D5E5F5;
            background-color: #F2F7FC;
            margin-bottom: 15px;
        }
        .box-header {
            background-color: #EAEAEA;
            border-bottom: 1px solid #D3D3D3;
            padding: 6px 8px;
            font-weight: bold;
            color: #444;
        }
        .box-content {
            padding: 10px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .form-input, .form-textarea {
            width: 100%;
            border: 1px solid #7F9DB9;
            padding: 4px;
            box-sizing: border-box;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="header-bar">
            <div id="logo">
                <a href="index.html" style="color:black;">my<span>Blog</span></a> 
                <span style="font-size:14px; color:#666; font-weight:normal;">[Admin Control Panel]</span>
            </div>
            <div>
                <a href="index.html" class="button-retro" style="text-decoration:none; color:black;">← Back to Main Site</a>
            </div>
        </div>

        <div class="main-layout">
            <div class="box">
                <div class="box-header" id="form-panel-title">Upload / Create New Blog Post</div>
                <div class="box-content">
                    <form id="post-form">
                        <div class="form-group">
                            <label>Post Title:</label>
                            <input type="text" id="post-title" class="form-input" required placeholder="e.g., My crazy weekend coding session">
                        </div>
                        <div class="form-group">
                            <label>Blog Content / Description Box:</label>
                            <textarea id="post-content" rows="8" class="form-textarea" required placeholder="Type your updates here..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Thumbnail Image URL:</label>
                            <input type="url" id="post-image" class="form-input" placeholder="e.g., https://example.com/image.jpg (Leave empty for default)">
                        </div>
                        <div class="form-group">
                            <label>Star Rating Selection Asset:</label>
                            <select id="post-stars" class="form-input" style="width: auto;">
                                <option value="5">5 Stars (Awesome)</option>
                                <option value="4">4 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="2">2 Stars</option>
                                <option value="1">1 Star (Lame)</option>
                            </select>
                        </div>
                        <button type="submit" id="submit-btn" class="button-retro" style="font-size:13px; padding: 5px 15px;">Publish Bulletin</button>
                        <button type="button" id="cancel-edit-btn" class="button-retro" style="font-size:13px; padding: 5px 15px; display: none; color: #555;" onclick="clearEditMode()">Cancel Edit</button>
                    </form>
                </div>
            </div>

            <div class="box">
                <div class="box-header">Manage Active Bulletins</div>
                <div class="box-content" id="admin-queue">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://npgslvyukrbnugxkdisp.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_jv_RDsZY8--iwjAIFsAqDw_wHGX_RQx";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const accessKey = prompt("Enter Administration Password:");
        if (accessKey !== "sUyxnIB6qRr7aG1N") {
            alert("Access Denied: Terminal Lock Active.");
            window.location.href = "index.html"; 
        }

        let blogPosts = [];
        let editingPostId = null;

        async function fetchQueue() {
            let { data, error } = await _supabase.from('posts').select('*').order('id', { ascending: false });
            if (error) console.error(error);
            blogPosts = data || [];
            renderQueue();
        }

        function renderQueue() {
            const queueContainer = document.getElementById('admin-queue');
            queueContainer.innerHTML = '';

            if (blogPosts.length === 0) {
                queueContainer.innerHTML = '<span style="color:#666; font-style:italic;">No active posts in the queue matrix.</span>';
                return;
            }

            blogPosts.forEach(post => {
                const row = document.createElement('div');
                row.style.cssText = "border-bottom: 1px dashed #CCC; padding: 6px 0; display: flex; justify-content: space-between; align-items: center;";
                row.innerHTML = `
                    <div style="max-width: 65%;">
                        <strong style="color:#0033CC;">${escapeHTML(post.title)}</strong><br>
                        <span style="font-size:11px; color:#666;">Date: ${post.date}</span>
                    </div>
                    <div>
                        <button class="button-retro" style="color:blue;" onclick="startEditPost(${post.id})">Edit</button>
                        <button class="button-retro" style="color:red;" onclick="deletePost(${post.id})">Delete</button>
                    </div>
                `;
                queueContainer.appendChild(row);
            });
        }

        window.startEditPost = function(id) {
            const targetPost = blogPosts.find(p => p.id === id);
            if (!targetPost) return;

            editingPostId = id;
            
            document.getElementById('post-title').value = targetPost.title;
            document.getElementById('post-content').value = targetPost.content;
            document.getElementById('post-image').value = targetPost.image || '';
            document.getElementById('post-stars').value = targetPost.stars;

            document.getElementById('form-panel-title').innerText = "⚠️ Editing Blog Entry: " + targetPost.title;
            document.getElementById('submit-btn').innerText = "Save Changes";
            document.getElementById('cancel-edit-btn').style.display = "inline-block";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.clearEditMode = function() {
            editingPostId = null;
            document.getElementById('post-form').reset();
            document.getElementById('form-panel-title').innerText = "Upload / Create New Blog Post";
            document.getElementById('submit-btn').innerText = "Publish Bulletin";
            document.getElementById('cancel-edit-btn').style.display = "none";
        }

        document.getElementById('post-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const image = document.getElementById('post-image').value.trim();
            const stars = parseInt(document.getElementById('post-stars').value);

            if (editingPostId !== null) {
                const { error } = await _supabase
                    .from('posts')
                    .update({ title: title, content: content, image: image, stars: stars })
                    .eq('id', editingPostId);

                if (error) {
                    alert('Update Error: ' + error.message);
                } else {
                    alert('Changes saved successfully!');
                    clearEditMode();
                    fetchQueue();
                }
            } else {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                const formattedDate = new Date().toLocaleDateString('en-US', options);

                const { error } = await _supabase.from('posts').insert([
                    {
                        title: title,
                        content: content,
                        image: image || null,
                        stars: stars,
                        date: formattedDate,
                        views: 0
                    }
                ]);

                if (error) {
                    alert('Database Error: ' + error.message);
                } else {
                    document.getElementById('post-form').reset();
                    alert('Your masterpiece has been updated successfully!');
                    fetchQueue();
                }
            }
        });

        window.deletePost = async function(id) {
            if (confirm("Are you sure you want to remove this bulletin from history?")) {
                if (editingPostId === id) clearEditMode();
                const { error } = await _supabase.from('posts').delete().eq('id', id);
                if (error) console.error(error);
                fetchQueue();
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        fetchQueue();
    </script>
</body>
</html>
