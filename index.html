<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>myBlog</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        body {
            background-color: #FFFFFF;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        a {
            color: #0033CC;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        #header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            margin-bottom: 15px;
        }
        #logo {
            font-size: 28px;
            font-weight: bold;
            color: #000;
            letter-spacing: -1px;
        }
        #logo span {
            background-color: #FF0000;
            color: #FFF;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 2px;
        }
        .search-box {
            border: 1px solid #7F9DB9;
            padding: 4px;
            width: 300px;
        }
        .button-retro {
            background: #ECECEC;
            border: 1px solid #CCCCCC;
            border-bottom: 2px solid #999999;
            border-right: 2px solid #999999;
            color: #000;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .button-retro:active {
            border: 1px solid #999999;
            border-top: 2px solid #666666;
            border-left: 2px solid #666666;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .box {
            border: 1px solid #D5E5F5;
            background-color: #F2F7FC;
            margin-bottom: 15px;
        }
        .box-header {
            background-color: #EAEAEA;
            border-bottom: 1px solid #D3D3D3;
            padding: 6px 8px;
            font-weight: bold;
            color: #444;
            display: flex;
            justify-content: space-between;
        }
        .box-content {
            padding: 10px;
        }
        .post-title {
            font-size: 18px;
            color: #0033CC;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .post-meta {
            font-size: 11px;
            color: #666;
            margin-bottom: 10px;
            border-bottom: 1px dashed #CCC;
            padding-bottom: 5px;
        }
        .post-body {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        .stars {
            color: #FFCC00;
            font-size: 14px;
        }
        .thumb-img {
            width: 60px;
            height: 45px;
            object-fit: cover;
            border: 1px solid #999;
            margin-right: 8px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="header-bar">
            <div id="logo"><a href="index.html" style="color:black;">my<span>Blog</span></a></div>
            <div>
                <input type="text" id="search-input" class="search-box" placeholder="Search blog posts...">
                <button class="button-retro" onclick="executeSearch()">Search</button>
            </div>
            <div>
                <a href="admin.html" class="button-retro" style="background-color: #FFF9CC; border-color: #E6DB55; text-decoration: none; padding: 4px 10px;">Admin CP</a>
            </div>
        </div>

        <div class="main-layout" id="main-content-wrapper" style="display: none;">
            <div>
                <div class="box">
                    <div class="box-header">
                        <span>Now Reading</span>
                        <span>From: Admin</span>
                    </div>
                    <div class="box-content">
                        <div style="display: flex; gap: 15px; flex-direction: column;">
                            <img id="active-image" style="width: 100%; max-height: 250px; object-fit: cover; border: 1px solid #DDD; display: none; margin-bottom: 10px;">
                            <div>
                                <div class="post-title" id="active-title"></div>
                                <div class="post-meta" id="active-meta"></div>
                                <div class="post-body" id="active-body"></div>
                                <div>
                                    <span style="font-weight:bold;">Rating:</span> 
                                    <span class="stars" id="active-stars"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="box">
                    <div class="box-header">More Bulletins</div>
                    <div class="box-content" id="sidebar-list" style="padding: 5px;">
                    </div>
                </div>
            </div>
        </div>

        <div id="empty-state" class="box" style="padding: 40px; text-align: center;">
            <h2 id="empty-title" style="color: #666;">No Blogs Posted Yet!</h2>
            <p id="empty-desc" style="color: #888;">The database is completely clear.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://npgslvyukrbnugxkdisp.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_jv_RDsZY8--iwjAIFsAqDw_wHGX_RQx";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let blogPosts = [];
        let filteredPosts = [];
        const urlParams = new URLSearchParams(window.location.search);
        let activeId = urlParams.get('id'); 

        async function fetchPosts() {
            let { data, error } = await _supabase.from('posts').select('*').order('id', { ascending: false });
            if (error) console.error(error);
            blogPosts = data || [];
            filteredPosts = blogPosts;
            
            if (!activeId && filteredPosts.length > 0) {
                activeId = filteredPosts[0].id.toString();
            }
            renderPage();
        }

        function executeSearch() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            
            if (query === "") {
                filteredPosts = blogPosts;
            } else {
                filteredPosts = blogPosts.filter(post => 
                    post.title.toLowerCase().includes(query) || 
                    post.content.toLowerCase().includes(query)
                );
            }

            if (filteredPosts.length > 0) {
                activeId = filteredPosts[0].id.toString();
            }
            
            renderPage();
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                executeSearch();
            }
        });

        async function renderPage() {
            if (filteredPosts.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('main-content-wrapper').style.display = 'none';
                
                if (document.getElementById('search-input').value.trim() !== "") {
                    document.getElementById('empty-title').innerText = "No Search Results Found!";
                    document.getElementById('empty-desc').innerText = "Try searching for a different keyword.";
                } else {
                    document.getElementById('empty-title').innerText = "No Blogs Posted Yet!";
                    document.getElementById('empty-desc').innerText = "The database is completely clear.";
                }
                return;
            }

            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('main-content-wrapper').style.display = 'grid';

            let currentPost = filteredPosts.find(p => p.id.toString() === activeId.toString()) || filteredPosts[0];
            
            if (!sessionStorage.getItem(`viewed-${currentPost.id}`)) {
                currentPost.views += 1;
                sessionStorage.setItem(`viewed-${currentPost.id}`, 'true');
                await _supabase.from('posts').update({ views: currentPost.views }).eq('id', currentPost.id);
            }

            const mainImg = document.getElementById('active-image');
            if (currentPost.image) {
                mainImg.src = currentPost.image;
                mainImg.style.display = 'block';
            } else {
                mainImg.style.display = 'none';
            }

            document.getElementById('active-title').innerText = currentPost.title;
            document.getElementById('active-meta').innerText = `Added: ${currentPost.date} | Views: ${currentPost.views}`;
            document.getElementById('active-body').innerText = currentPost.content;
            
            let starString = '';
            for(let i=0; i<5; i++) {
                starString += i < currentPost.stars ? '★' : '☆';
            }
            document.getElementById('active-stars').innerText = starString;

            const sidebar = document.getElementById('sidebar-list');
            sidebar.innerHTML = '';
            filteredPosts.forEach(post => {
                let sideStars = '★'.repeat(post.stars);
                const item = document.createElement('div');
                item.style.cssText = "display: flex; margin-bottom: 10px; border-bottom: 1px solid #EEE; padding-bottom: 5px;";
                
                let imageElement = `
                    <div style="width: 60px; height: 45px; background-color: #DDD; border: 1px solid #999; margin-right: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; font-weight: bold; text-align: center;">
                        BLOG
                    </div>`;
                if (post.image) {
                    imageElement = `<img src="${escapeHTML(post.image)}" class="thumb-img" onerror="this.style.display='none'">`;
                }

                item.innerHTML = `
                    ${imageElement}
                    <div>
                        <a href="#" onclick="changeActivePost('${post.id}'); return false;" style="font-weight: ${post.id.toString() === currentPost.id.toString() ? 'bold' : 'normal'}; font-size: 12px; display: block;">${escapeHTML(post.title)}</a>
                        <span style="font-size: 11px; color: #666;">Views: ${post.views}</span><br>
                        <span class="stars" style="font-size:11px;">${sideStars}</span>
                    </div>
                `;
                sidebar.appendChild(item);
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        fetchPosts();
    </script>
</body>
</html>
